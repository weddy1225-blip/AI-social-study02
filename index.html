      background: #1a1c1e; color: #4ade80; border: 1px solid #4ade80;

      <span class="warning">準備好啟動神經連結了嗎？</span>
    </div>
    <button class="action-btn" onclick="startGame()">啟動系統</button>
  </div>

      <div id="hint-text"></div>
      <div class="btn-grid" id="option-area"></div>
    </div>
    <div id="feedback-area" class="hidden">

      <div id="image-area">
        <div id="image-content"></div>
        <a id="search-link" target="_blank" class="google-search-btn">🔗 查閱完整的歷史存檔影像</a>
      </div>
      <button class="action-btn" onclick="goToNext()">前往下一個節點</button>
    </div>
  </div>

  <div id="end-screen" class="hidden">
    <div id="final-content"></div>
    <button class="action-btn" onclick="location.reload()">重新初始化系統</button>
  </div>
</div>

    { name: "塑膠薄片，墊在碗盤下面防止燙壞桌面", correct: "隔熱墊", hint: "餐桌上的防護層" },
    { name: "長條木片刻有刻度，用來量長度", correct: "木尺", hint: "裁縫師傅常用的測量工具" },
    { name: "玻璃罩內有一條金屬絲，通電會發黃光", correct: "鎢絲燈泡", hint: "早期街道與家中的主要照明" },
    { name: "金屬製的細長針，末端有圓球，用來固定布料", correct: "大頭針", hint: "縫紉或佈告欄常見的固定具" },
    { name: "印有花紋的薄紙，用來包裹昂貴的水果", correct: "水果包裝紙", hint: "早期送禮高級感的象徵" },
    { name: "長方形的軟布，中間塞滿棉花，睡覺墊頭", correct: "枕頭", hint: "每日舒眠的必需品" },
    { name: "一根竹籤撐著半圓形紙片，搖動會有風", correct: "紙扇", hint: "古早味的手動降溫設備" },
    { name: "塑膠製成的長管，口對口可以講話", correct: "傳聲筒", hint: "簡易的聲學物理玩具" },
    { name: "鐵製的長夾，用來夾取發燙的煤炭", correct: "火鉗", hint: "廚房灶爐邊的必備工具" },
    { name: "手搖轉動的鐵箱，裡面會掉出有編號的球", correct: "抽獎機", hint: "尾牙或市集常見的博弈工具" },
    { name: "彩色玻璃紙包裹的橢圓形硬糖", correct: "黃金糖", hint: "柑仔店最經典的透明糖果" }
  ];

  let gameData = [];
  let currentStep = 0;
  let score = 0;

  function initGame() {
    const shuffled = [...allArtifacts].sort(() => Math.random() - 0.5);
    gameData = shuffled.slice(0, 6).map(q => {
      let options = [q.correct];
      while (options.length < 4) {
        let rand = allArtifacts[Math.floor(Math.random() * allArtifacts.length)].correct;
        if (!options.includes(rand)) options.push(rand);
      }
      return { ...q, options: options.sort(() => Math.random() - 0.5) };
    });
  }

  window.onload = initGame;

  function startGame() {
    document.getElementById('intro-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    renderQuestion();
  }

  function toggleHint() {
    document.getElementById('hint-text').style.display = 'block';
    document.getElementById('hint-trigger').style.display = 'none';
  }

  function renderQuestion() {
    const item = gameData[currentStep];
    document.getElementById('prog-val').innerText = currentStep + 1;
    document.getElementById('feedback-area').classList.add('hidden');
    document.getElementById('question-area').classList.remove('hidden');
    document.getElementById('hint-text').style.display = 'none';
    document.getElementById('hint-text').innerText = `掃描建議：${item.hint}`;
    document.getElementById('hint-trigger').style.display = 'inline-block';
    
    document.getElementById('question-box').innerHTML = `描述鎖定：<br>${item.name}`;
    
    const area = document.getElementById('option-area');
    area.innerHTML = '';
    item.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = opt;
      btn.onclick = () => processAnswer(opt);
      area.appendChild(btn);
    });
  }

  async function fetchImage(term) {
    const display = document.getElementById('image-content');
    display.innerHTML = '<div class="loading-scan">正在掃描歷史頻譜...</div>';
    
    const wikiUrl = `https://zh.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`;
    
    try {
      const response = await fetch(wikiUrl);
      const data = await response.json();
      if (data.thumbnail) {
        display.innerHTML = `<img src="${data.thumbnail.source}" class="artifact-img" alt="${term}">`;
      } else {
        display.innerHTML = '<div style="color:#888; font-size:14px; border:1px dashed #4ade80; padding:20px;">[ 影像毀損，請存取舊文明伺服器 ]</div>';
      }
    } catch (e) {
      display.innerHTML = '<div style="color:#888; font-size:14px;">[ 連線超時，掃描中斷 ]</div>';
    }
  }

  async function processAnswer(choice) {
    const item = gameData[currentStep];
    const isCorrect = (choice === item.correct);
    const resultDiv = document.getElementById('result-text');
    
    document.getElementById('question-area').classList.add('hidden');
    document.getElementById('feedback-area').classList.remove('hidden');

    if (isCorrect) {
      score++;
      resultDiv.innerHTML = `<span style="color:#4ade80;">鑑定成功！這是「${item.correct}」</span>`;
    } else {
      resultDiv.innerHTML = `<span style="color:#ff6b6b;">鑑定失敗！正確為「${item.correct}」</span>`;
    }

    const searchBtn = document.getElementById('search-link');
    searchBtn.href = `https://www.google.com/search?q=${encodeURIComponent(item.correct)}&tbm=isch`;
    searchBtn.innerText = `🔗 連往舊文明伺服器搜尋「${item.correct}」`;

    await fetchImage(item.correct);
  }

  function goToNext() {
    currentStep++;
    if (currentStep < 6) renderQuestion();
    else showFinalEnding();
  }

  function showFinalEnding() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.remove('hidden');
    const percent = Math.round((score / 6) * 100);
    let rank = percent === 100 ? "特級考古大師" : percent >= 60 ? "資深鑑定官" : "實習挖掘員";
    document.getElementById('final-content').innerHTML = `
      <div style="font-size:32px; margin-bottom:10px; color:#fff;">修復率：${percent}%</div>
      <div style="font-size:24px; margin-bottom:20px; color:#4ade80;">鑑定職等：${rank}</div>
      <div class="content-box" style="text-align:center;">
        鑑定任務結束。${score} 個歷史節點已重新寫入核心磁區。<br>
        2077 年的未來，感謝你的貢獻。
      </div>
    `;
  }
</script>
</body>
</html>
