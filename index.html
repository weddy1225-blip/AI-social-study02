<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2077 考古隊：家鄉遺物鑑定挑戰</title>
  <style>
    /* 核心視覺：深色護眼、高科技感 */
    body { 
      background-color: #1a1c1e; 
      color: #a8ffb5; 
      font-family: '微軟正黑體', 'PingFang TC', sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
    }

    #game-container { 
      width: 90%; 
      max-width: 650px; 
      border: 3px solid #4ade80; 
      padding: 40px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
      border-radius: 20px; 
      text-align: center; 
      background-color: #24272a;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content-box { 
      font-size: 26px; 
      line-height: 1.6; 
      text-align: left; 
      margin-bottom: 35px; 
      font-weight: bold; 
      color: #e2e8f0; 
    }

    .warning { color: #ff6b6b; font-weight: 900; }

    .status-header { 
      font-size: 20px; 
      color: #94a3b8; 
      margin-bottom: 25px; 
      font-weight: bold;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
    }

    .btn-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
    }

    .action-btn { 
      background: #4ade80; 
      color: #1a1c1e; 
      border: none; 
      padding: 22px 50px; 
      cursor: pointer; 
      font-size: 28px; 
      font-weight: 900; 
      border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
      transition: transform 0.2s;
    }

    .action-btn:hover { transform: scale(1.05); }

    .option-btn { 
      background: #334155; 
      color: #f8fafc; 
      border: 2px solid #4ade80; 
      padding: 22px 10px; 
      cursor: pointer; 
      font-size: 24px; 
      font-weight: bold;
      border-radius: 12px; 
      transition: all 0.2s;
    }

    .option-btn:hover { background: #4ade80; color: #1a1c1e; }
    .hidden { display: none !important; }
    .ending-title { font-size: 38px; margin-bottom: 30px; color: #fff; font-weight: 900; text-shadow: 0 0 20px #4ade80; }
    #result-text { font-size: 28px; font-weight: bold; margin-bottom: 35px; color: #fff; }

    /* GAS 連結按鈕 (放在底部的低調按鈕) */
    .gas-info { margin-top: 30px; font-size: 14px; color: #666; }
    .gas-info a { color: #4ade80; text-decoration: none; }
  </style>
</head>
<body>

<div id="game-container">
  <div id="intro-screen">
    <h1 style="color: #4ade80; font-size: 42px; margin-top: 0;">2077 考古隊員登錄</h1>
    <div class="content-box">
      嗶——！歡迎回到 2077 年的新台灣。<br>
      我是你的 AI 助理。現在我們正站在一片廢墟之上，這裡是 50 年前被稱為「家鄉」的地方。<br><br>
      <span class="warning">任務： 找出古代遺物正確的名稱。</span><br>
      如果你鑑定錯誤，歷史將會被徹底扭曲！
    </div>
    <button id="start-btn" class="action-btn" onclick="startGame()">開始鑑定</button>
    
    <div class="gas-info">
      本遊戲亦支援 <a href="你的GAS網址" target="_blank">Google GAS 雲端版</a>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <div id="status-bar" class="status-header">考古進度：<span id="prog-val">1</span> / 6</div>
    <div id="question-area">
      <div id="question-box" class="content-box"></div>
      <div id="option-area" class="btn-grid"></div>
    </div>
    <div id="feedback-area" class="hidden">
      <div id="result-text"></div>
      <button class="action-btn" onclick="goToNext()">前往下一個遺物</button>
    </div>
  </div>

  <div id="end-screen" class="hidden">
    <div id="final-content"></div>
    <button class="option-btn" onclick="location.reload()" style="margin-top: 40px; width: 100%;">重啟考古系統</button>
  </div>
</div>

<script>
  // 直接在前端定義題庫 (這就是讓 GitHub 能跑的關鍵)
  const allArtifacts = [
    { name: "黑盒子有 0-9 圓圈，連著放耳朵的長條物", correct: "撥盤式電話", hint: "以前沒螢幕時的通訊工具" },
    { name: "彩色塑膠卡片印著 100 元，要插進公用機器", correct: "電話卡", hint: "打公用電話必備的卡片" },
    { name: "木頭板子中間挖了烏龜形狀的洞，有漂亮刻紋", correct: "紅龜粿模具", hint: "做傳統紅色烏龜點心的工具" },
    { name: "透明方塊盒子，裡面捲著兩圈黑色細磁帶", correct: "錄音帶", hint: "以前用來錄音或聽歌的匣子" },
    { name: "巨大圓形石盤，中間有洞，轉動會磨出豆漿", correct: "石磨", hint: "古代用來磨豆子或米的機器" },
    { name: "紅、藍、綠三色橫條紋的塑膠提袋", correct: "茄芷袋", hint: "台灣最有名的傳統購物袋" },
    { name: "厚厚的紙本大書，裡面印滿了全台灣人的號碼", correct: "電話簿", hint: "以前找人電話要翻這本" },
    { name: "鐵製重物，燒熱後用來把衣服壓得平整", correct: "熨斗", hint: "讓衣服不皺的小幫手" },
    { name: "圓形小鐵片，邊緣有鋸齒，小孩在地上彈射", correct: "尪仔標", hint: "以前流行的紙牌對戰遊戲" },
    { name: "竹子編成的遮陽帽，農夫下田時必帶", correct: "斗笠", hint: "用竹葉編成的遮陽擋雨帽" },
    { name: "腰帶上的小盒子，會嗶嗶叫並顯示數字", correct: "BB Call", hint: "手機流行前的隨身聯絡器" },
    { name: "手動旋轉的機器，把米放入會蹦出巨大響聲", correct: "爆米香機", hint: "製作傳統米點心的壓力機" },
    { name: "灰色的遊戲機，要插大卡帶才能玩瑪利歐", correct: "紅白機", hint: "阿公年代最紅的電視遊戲機" },
    { name: "彩色玻璃小珠子，古代小孩在地上彈來彈去", correct: "彈珠", hint: "圓圓的、亮亮的玻璃玩具" },
    { name: "鐵皮做的漏斗燈，要裝油點火，以前沒電時用", correct: "煤油燈", hint: "早期用來照明的燈具" },
    { name: "木頭做的長板，以前廟口或家門口乘涼坐的", correct: "長板凳", hint: "可以坐很多人的長型椅子" },
    { name: "腳踏式木頭機器，轉動會把稻穀的殼吹掉", correct: "風選機", hint: "農夫用來分離穀殼的工具" },
    { name: "抓魚用的竹編籠子，放在河裡魚就進不去了", correct: "魚筌", hint: "竹子編成的陷阱式抓魚工具" },
    { name: "寫著地名的小紙片，以前搭火車要剪洞進站", correct: "火車票", hint: "乘車必備的紙質憑證" },
    { name: "長得像漏斗的鐵皮便當盒，有三四層高", correct: "鐵便當盒", hint: "以前學生帶午餐用的容器" },
    { name: "陶瓷做的碗，上面印有紅色的公雞圖案", correct: "公雞碗", hint: "阿公阿嬤家常見的古早餐具" },
    { name: "彎彎的像月亮，以前農夫用來收割稻米", correct: "鐮刀", hint: "割稻或除草用的利器" },
    { name: "像骰子一樣的方塊，要用手轉動對齊顏色", correct: "魔術方塊", hint: "訓練邏輯的手部益智玩具" },
    { name: "手動轉動手把，就會削出細細長長的鉛筆屑", correct: "削鉛筆機", hint: "以前寫作業前必用的工具" },
    { name: "綠色外殼，中間一個開關，煮飯超好用", correct: "電鍋", hint: "台灣人家裡都有的煮飯神器" },
    { name: "竹子編的圓形大盤子，用來曬乾香菇或菜脯", correct: "竹篩", hint: "曬乾東西的好幫手" },
    { name: "只有一個輪子的手推車，在農田運土或菜", correct: "單輪車", hint: "搬運重物的人力小車" },
    { name: "以前阿嬤用的針線盒，木頭做的有很多小格", correct: "針線盒", hint: "收納縫紉工具的箱子" },
    { name: "用羽毛和橡皮做的，小孩用腳踢不讓它掉地", correct: "毽子", hint: "古代人的足球，用腳踢的" },
    { name: "鐵皮做的青蛙，轉動發條後會在地上跳動", correct: "鐵皮玩具", hint: "不用電池就會動的金屬玩具" }
  ];

  let gameData = [];
  let currentStep = 0;
  let score = 0;

  // 遊戲初始化邏輯
  function initGame() {
    // 隨機抽選 6 題
    const shuffled = [...allArtifacts].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 6);
    
    gameData = selected.map(q => {
      // 生成選項：正確答案 + 3 個隨機錯誤答案
      let options = [q.correct];
      while (options.length < 4) {
        let rand = allArtifacts[Math.floor(Math.random() * allArtifacts.length)].correct;
        if (!options.includes(rand)) options.push(rand);
      }
      return {
        ...q,
        options: options.sort(() => Math.random() - 0.5)
      };
    });
  }

  // 網頁開啟就初始化
  window.onload = initGame;

  function startGame() {
    document.getElementById('intro-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    renderQuestion();
  }

  function renderQuestion() {
    const item = gameData[currentStep];
    document.getElementById('prog-val').innerText = currentStep + 1;
    document.getElementById('feedback-area').classList.add('hidden');
    document.getElementById('question-area').classList.remove('hidden');
    
    document.getElementById('question-box').innerHTML = `
      <span style="color:#4ade80;">[遺物序號：00${currentStep + 1}]</span><br>
      描述：${item.name}<br><br>
      <span style="font-size:20px; color:#94a3b8;">掃描提示：${item.hint}</span>
    `;
    
    const area = document.getElementById('option-area');
    area.innerHTML = '';
    item.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = opt;
      btn.onclick = () => processAnswer(opt);
      area.appendChild(btn);
    });
  }

  function processAnswer(choice) {
    const item = gameData[currentStep];
    const isCorrect = (choice === item.correct);
    const resultDiv = document.getElementById('result-text');
    
    document.getElementById('question-area').classList.add('hidden');
    document.getElementById('feedback-area').classList.remove('hidden');

    if (isCorrect) {
      score++;
      resultDiv.innerHTML = `鑑定成功！<br><span style="color:#4ade80;">這確實是古代的「${item.correct}」。</span>`;
    } else {
      resultDiv.innerHTML = `<span class="warning">鑑定失敗！</span><br>歷史已扭曲為「${choice}」。<br><span style="font-size:20px; color:#aaa;">正確應為：${item.correct}</span>`;
    }
  }

  function goToNext() {
    currentStep++;
    if (currentStep < 6) {
      renderQuestion();
    } else {
      showFinalEnding();
    }
  }

  function showFinalEnding() {
    document.getElementById('game-screen').classList.add('hidden');
    const endScreen = document.getElementById('end-screen');
    const finalContent = document.getElementById('final-content');
    endScreen.classList.remove('hidden');

    const percent = Math.round((score / 6) * 100);
    let title = (score === 6) ? "【結局 A：歷史修正官】" : (score >= 3) ? "【結局 B：時空詐欺師】" : "【結局 C：文明斷層者】";
    let desc = `鑑定任務結束！成功修復率：${percent}%<br><br>感謝你參與 2077 年的歷史保衛戰。`;

    finalContent.innerHTML = `
      <div class="ending-title">${title}</div>
      <div class="content-box" style="text-align:center;">${desc}</div>
    `;
  }
</script>
</body>
</html>
